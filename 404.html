<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Guillem Vidal</title>
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script>
        // The old al-folio section pages now live as anchors on the homepage,
        // so send visitors who land on an old path to the matching section.
        (function () {
            var path = location.pathname.replace(/\/+$/, '').toLowerCase();
            var map = {
                '/research': '#research',
                '/publications': '#publications',
                '/media': '#media'
            };
            if (map[path]) location.replace('/' + map[path]);
        })();
    </script>
</head>
<body>
    <main class="notfound">
        <p class="notfound-code">404</p>
        <h1>Page not found</h1>
        <p class="notfound-text">This page doesn't exist or has moved.</p>
        <a href="/" class="btn">&larr; Back to home</a>
    </main>
</body>
</html>
